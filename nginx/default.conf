server {
    listen 80;

    location /api/ {
        # We route to 3010 because that's our backend port
        proxy_pass http://backend:3010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}